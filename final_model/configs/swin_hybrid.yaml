# configs/swin_hybrid.yaml
# Swin-Tiny Hybrid (ResNet34 CNN + Swin-Tiny)
# RTX 4070 12GB - batch=6, accum=4, effective=24

name: swin_hybrid
model_arch: swin_hybrid
in_channels: 5
model_type: cnn
use_mixstyle: true
dp_rate: 0.15

lr: 2.0e-5
enc_lr_ratio: 0.15       # CNN+Swin encoder: 2e-5 * 0.15 = 3e-6
swin_lr_ratio: 0.30      # Swin branch: 2e-5 * 0.30 = 6e-6 (faster than CNN)
weight_decay: 1.0e-4
min_lr_ratio: 0.05

epochs: 250
batch_size: 6
accum_steps: 4           # effective batch = 24
warmup_epochs: 10
cls_rampup_epochs: 10
patience: 80
eval_every: 5

seg_weight: 0.80
cls_weight: 0.20
focal_gamma: 2.0
mibc_alpha: 1.6
ds_weights: [0.50, 0.25]
tversky_weight: 0.20

use_amp: false           # Swin attention can overflow in FP16 - use FP32
