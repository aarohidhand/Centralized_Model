# configs/resnet50.yaml
# ResNet50 + CBAM + MixStyle — Stable Version
# FIXED:
# - lower LR for stable MixStyle training
# - longer warmup for smoother encoder adaptation
# - reduced epochs
# - reduced patience
# - safer encoder LR

name: resnet50_cbam

model_arch: resnet50
in_channels: 5
model_type: cnn
dp_rate: 0.15
use_mixstyle: true

# ── Optimizer ─────────────────────────────────
lr: 1.0e-5
enc_lr_ratio: 0.10
weight_decay: 1.0e-4
min_lr_ratio: 0.05

# ── Training schedule ─────────────────────────
epochs: 140
batch_size: 8
accum_steps: 3
warmup_epochs: 20
cls_rampup_epochs: 20
patience: 30
eval_every: 5

# ── Loss weights ──────────────────────────────
seg_weight: 0.85
cls_weight: 0.15
focal_gamma: 2.0
mibc_alpha: 1.4
ds_weights: [0.50, 0.25]
tversky_weight: 0.20

# ── AMP ───────────────────────────────────────
use_amp: true